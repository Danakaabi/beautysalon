<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اختيار الخدمة | Beauty Salon</title>

    <style>
        * {margin:0;padding:0;box-sizing:border-box;}

        :root {
            --wave-bg:linear-gradient(180deg,#5a00e6,#8a2bff,#c77aff,#f3cbff);
            --mint:#00d5c3;
            --mint-hover:#00c5b4;
            --purple:#8A2BFF;
            --soft-shadow:0 8px 20px rgba(0,0,0,.16);
            --hover-shadow:0 14px 26px rgba(0,0,0,.22);
        }

        body {
            font-family:"Tajawal",Arial,sans-serif;
            min-height:100vh;
            background:var(--wave-bg);
            color:#fff;
            padding:24px 16px 120px;
            position:relative;
            overflow-x:hidden;
            animation:fadeUp .55s ease;
        }

        .back-btn {
            position:absolute;
            top:16px;
            right:16px;
            width:38px;
            height:38px;
            border:none;
            border-radius:50%;
            font-size:18px;
            color:#fff;
            display:flex;
            align-items:center;
            justify-content:center;
            background:rgba(255,255,255,.14);
            backdrop-filter:blur(8px);
            box-shadow:0 4px 12px rgba(0,0,0,.25);
            cursor:pointer;
            transition:.25s;
            text-decoration:none;
        }

        .back-btn:hover {
            background:rgba(255,255,255,.22);
            transform:translateY(-2px);
        }

        .logo-block {
            text-align:center;
            margin-top:50px;
            animation:fadeDown .7s ease;
        }

        .logo-icon svg {
            width:68px;
            height:68px;
            fill:#fff;
            filter:drop-shadow(0 4px 12px rgba(0,0,0,.18));
            transition:.3s;
        }

        .title {
            font-size:30px;
            font-weight:800;
            margin-top:6px;
        }

        .sub {
            font-size:13px;
            opacity:.85;
            letter-spacing:3px;
            margin-top:-4px;
        }

        .page-title {
            margin-top:10px;
            font-size:17px;
            opacity:.92;
        }

        .services-grid {
            max-width:1120px;
            margin:28px auto 0;
            display:grid;
            grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
            gap:22px;
        }

        .service-card {
            background:#fff;
            border-radius:22px;
            padding:22px 18px 20px;
            text-align:center;
            box-shadow:var(--soft-shadow);
            border:1px solid rgba(0,0,0,.04);
            cursor:pointer;
            opacity:0;
            transform:translateY(28px);
            animation:cardEnter .55s ease forwards;
            transition:.28s ease;
        }

        .service-card:hover {
            transform:translateY(-4px) scale(1.02);
            box-shadow:var(--hover-shadow);
        }

        .service-icon svg {
            width:50px;
            height:50px;
            stroke:var(--purple);
            stroke-width:2;
            fill:none;
            margin-bottom:10px;
        }

        .service-title {
            font-size:18px;
            font-weight:800;
            color:#4a00c8;
            margin-bottom:4px;
        }

        .price {
            font-size:15px;
            color:#666;
            margin-bottom:12px;
        }

        .btn-book {
            width:100%;
            height:42px;
            border:none;
            border-radius:14px;
            background:var(--mint);
            color:#fff;
            font-size:15px;
            font-weight:700;
            cursor:pointer;
            transition:.25s;
        }

        .btn-book:hover {
            background:var(--mint-hover);
            transform:translateY(-2px);
        }

        .empty-message {
            max-width:520px;
            margin:40px auto 0;
            padding:18px;
            background:rgba(255,255,255,.16);
            border-radius:18px;
            text-align:center;
            font-size:17px;
        }

        .waves {
            position:absolute;
            bottom:0;
            width:100%;
            opacity:.38;
            z-index:-1;
        }

        @keyframes fadeUp {
            0%{opacity:0;transform:translateY(22px);}
            100%{opacity:1;transform:translateY(0);}
        }

        @keyframes fadeDown {
            0%{opacity:0;transform:translateY(-22px);}
            100%{opacity:1;transform:translateY(0);}
        }

        @keyframes cardEnter {
            0%{opacity:0;transform:translateY(28px);}
            100%{opacity:1;transform:translateY(0);}
        }

        @media(max-width:480px){
            .logo-icon svg {
                width:52px;
                height:52px;
            }

            .title {
                font-size:25px;
            }

            .services-grid {
                grid-template-columns:1fr;
                gap:18px;
            }
        }
    </style>
</head>

<body>

<a href="{% url 'portal_client:home' %}" class="back-btn">←</a>

<div class="logo-block">
    <div class="logo-icon">
        <svg viewBox="0 0 64 64">
            <path d="M32 4c-4 6-6 10-6 14s2 8 6 8 6-4 6-8-2-8-6-14zm0 20c-6-4-10-6-14-6s-8 2-8 6 4 6 8 6 8-2 14-6zm0 0c6-4 10-6 14-6s8 2 8 6-4 6-8 6-8-2-14-6zm0 4c-4 6-6 10-6 14s2 8 6 8 6-4 6-8-2-8-6-14z"/>
        </svg>
    </div>
    <div class="title">Beauty Salon</div>
    <div class="sub">BEAUTY</div>
    <div class="page-title">اختيار الخدمة</div>
</div>

<form method="POST" action="{% url 'bookings:select_service' %}">
    {% csrf_token %}

    <input type="hidden" name="service" id="selectedServiceInput">

    <div class="services-grid">
        {% for service in services %}
            <div class="service-card" onclick="chooseService('{{ service.id }}')">
                <div class="service-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M6 11c0-4.5 3-7 6-8 3 1 6 3.5 6 8 0 3.5-1.5 6-4 7.5"/>
                        <path d="M8 11c0 3 1.5 4.5 3 5.5"/>
                        <path d="M11 14.5c.8.7 2.2.7 3 0"/>
                    </svg>
                </div>

                <div class="service-title">{{ service.name }}</div>
                <div class="price">{{ service.price }} ريال</div>

                <button type="button" class="btn-book">اختيار</button>
            </div>
        {% empty %}
            <div class="empty-message">
                لا توجد خدمات متاحة حالياً.
            </div>
        {% endfor %}
    </div>
</form>

<div class="waves">
    <svg viewBox="0 0 1440 320">
        <path fill="#ffffff" fill-opacity="0.33"
              d="M0,128L80,144C160,160,320,192,480,176C640,160,800,96,960,74.7C1120,53,1280,75,1360,85.3L1440,96V320H0Z"/>
    </svg>
</div>

<script>
    function chooseService(serviceId) {
        const input = document.getElementById("selectedServiceInput");
        const form = input.closest("form");

        if (!serviceId || !form) {
            return;
        }

        input.value = serviceId;
        form.submit();
    }
</script>

</body>
</html>
